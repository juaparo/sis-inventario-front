<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-blue-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-xl mb-4">
        <lucide-icon [img]="PackageIcon" class="w-8 h-8 text-white"></lucide-icon>
      </div>
      <h1 class="text-3xl font-bold text-gray-900">SIS-INVENTARIO</h1>
      <p class="text-gray-500 mt-2">Nueva Contraseña</p>
    </div>

    <div class="bg-white rounded-xl shadow-lg border border-gray-100 p-8">
      <h2 class="text-xl font-semibold text-gray-900 mb-6">Restablecer tu contraseña</h2>

      <div *ngIf="error" class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-md">
        {{ error }}
      </div>
      
      <div *ngIf="success" class="mb-4 p-3 bg-green-50 border border-green-200 text-green-600 text-sm rounded-md">
        {{ success }}
      </div>

      <form *ngIf="!success" (submit)="handleSubmit($event)" class="space-y-5">
        
        <div class="space-y-2">
          <label class="text-sm font-medium leading-none">Nueva contraseña</label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="••••••••"
              [(ngModel)]="password"
              (ngModelChange)="validatePassword()"
              name="password"
              class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 pr-10"
            />
            <button
              type="button"
              (click)="togglePassword('password')"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
            >
              <lucide-icon *ngIf="showPassword" [img]="EyeOffIcon" class="w-4 h-4"></lucide-icon>
              <lucide-icon *ngIf="!showPassword" [img]="EyeIcon" class="w-4 h-4"></lucide-icon>
            </button>
          </div>

          <!-- Checklist de seguridad -->
          <div class="mt-3 p-3 bg-gray-50 rounded-lg text-xs space-y-2 border border-gray-100">
            <p class="font-medium text-gray-700 mb-1">La contraseña debe tener:</p>
            <div class="flex items-center gap-2 transition-colors duration-300" [ngClass]="rules.length ? 'text-green-600' : 'text-gray-400'">
              <lucide-icon [img]="rules.length ? CheckIcon : XIcon" class="w-3 h-3"></lucide-icon>
              <span>Mínimo 8 caracteres</span>
            </div>
            <div class="flex items-center gap-2 transition-colors duration-300" [ngClass]="rules.upper ? 'text-green-600' : 'text-gray-400'">
              <lucide-icon [img]="rules.upper ? CheckIcon : XIcon" class="w-3 h-3"></lucide-icon>
              <span>Al menos una mayúscula</span>
            </div>
            <div class="flex items-center gap-2 transition-colors duration-300" [ngClass]="rules.lower ? 'text-green-600' : 'text-gray-400'">
              <lucide-icon [img]="rules.lower ? CheckIcon : XIcon" class="w-3 h-3"></lucide-icon>
              <span>Al menos una minúscula</span>
            </div>
            <div class="flex items-center gap-2 transition-colors duration-300" [ngClass]="rules.number ? 'text-green-600' : 'text-gray-400'">
              <lucide-icon [img]="rules.number ? CheckIcon : XIcon" class="w-3 h-3"></lucide-icon>
              <span>Al menos un número</span>
            </div>
            <div class="flex items-center gap-2 transition-colors duration-300" [ngClass]="rules.special ? 'text-green-600' : 'text-gray-400'">
              <lucide-icon [img]="rules.special ? CheckIcon : XIcon" class="w-3 h-3"></lucide-icon>
              <span>Al menos un carácter especial</span>
            </div>
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-medium leading-none">Confirmar contraseña</label>
          <div class="relative">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              placeholder="••••••••"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 pr-10"
            />
            <button
              type="button"
              (click)="togglePassword('confirm')"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
            >
              <lucide-icon *ngIf="showConfirmPassword" [img]="EyeOffIcon" class="w-4 h-4"></lucide-icon>
              <lucide-icon *ngIf="!showConfirmPassword" [img]="EyeIcon" class="w-4 h-4"></lucide-icon>
            </button>
          </div>
        </div>

        <button [disabled]="isLoading" type="submit" class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 shadow h-9 px-4 py-2 w-full bg-blue-600 hover:bg-blue-700 text-white mt-4">
          Actualizar contraseña
        </button>
      </form>
    </div>
  </div>
</div>
